<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single-File Billing Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .calculator-card {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 350px;
        }

        h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
            font-size: 14px;
        }

        /* Distinct input boxes */
        input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #4caf50;
            outline: none;
        }

        button {
            width: 100%;
            background-color: #4caf50;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        button:hover {
            background-color: #45a049;
        }

        .receipt-box {
            margin-top: 20px;
            background: #f9f9f9;
            border-left: 4px solid #4caf50;
            padding: 15px;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            white-space: pre-line;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="calculator-card">
        <h2>🧾 Billing Calculator</h2>
        
        <div class="input-group">
            <label for="subtotal">Bill Subtotal ($)</label>
            <input type="number" id="subtotal" placeholder="0.00" min="0" step="0.01">
        </div>

        <div class="input-group">
            <label for="taxRate">Tax Rate (%)</label>
            <input type="number" id="taxRate" placeholder="12" min="0" step="0.1" value="12">
        </div>

        <div class="input-group">
            <label for="discount">Discount Amount ($)</label>
            <input type="number" id="discount" placeholder="0.00" min="0" step="0.01" value="0">
        </div>

        <button id="calculateBtn">Calculate Total</button>

        <div class="receipt-box" id="receiptOutput">
            Enter values above and click calculate.
        </div>
    </div>

    <script>
        // 1. CONST: Elements that remain unchanged
        const calculateBtn = document.getElementById('calculateBtn');
        const receiptOutput = document.getElementById('receiptOutput');

        // 2. VAR: Globally scoped demonstration
        var currencySymbol = "$"; 

        calculateBtn.addEventListener('click', () => {
            // 3. LET: Variables that adapt to changing user inputs
            let subtotal = parseFloat(document.getElementById('subtotal').value) || 0;
            let taxRate = parseFloat(document.getElementById('taxRate').value) || 0;
            let discount = parseFloat(document.getElementById('discount').value) || 0;

            const taxAmount = subtotal * (taxRate / 100);
            const finalTotal = subtotal + taxAmount - discount;

            // 4. OBJECT CREATION
            const billSummary = {
                baseAmount: subtotal.toFixed(2),
                addedTax: taxAmount.toFixed(2),
                subtractedDiscount: discount.toFixed(2),
                grandTotal: finalTotal.toFixed(2)
            };

            // 5. DESTRUCTURING: Unpacking the object
            const { baseAmount, addedTax, subtractedDiscount, grandTotal } = billSummary;

            // 6. TEMPLATE LITERALS: Multi-line string interpolation
            const receiptTemplate = `
                === RECEIPT SUMMARY ===
                Subtotal:  ${currencySymbol}${baseAmount}
                Tax:       ${currencySymbol}${addedTax} (${taxRate}%)
                Discount: -${currencySymbol}${subtractedDiscount}
                -----------------------
                TOTAL:     ${currencySymbol}${grandTotal}
                =======================
            `;

            receiptOutput.innerText = receiptTemplate;
        });
    </script>
</body>
</html>
